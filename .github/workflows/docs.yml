name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build monorepo
        run: pnpm build

      - name: Build docs site
        run: pnpm --filter @velox/flowgraph-docs build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: flowgraph-docs-dist
          path: apps/docs/dist
          retention-days: 7

  dispatch-website:
    name: Trigger veloxdevworks.com deploy
    needs: build-docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Dispatch site-deploy to veloxdevworks/website
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.VELOXDEVWORKS_DEPLOY_PAT }}
          repository: veloxdevworks/website
          event-type: site-deploy
          client-payload: '{"flowgraph_sha":"${{ github.sha }}"}'
        continue-on-error: true
